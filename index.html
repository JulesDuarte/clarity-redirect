<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarity</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F2EDE6;
      font-family: Arial, sans-serif;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2A5240;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .3; transform: scale(.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="dot"></div>

  <script>
    var SUPABASE_URL = 'https://gjweufogltwzescnauji.supabase.co';
    var SUPABASE_ANON_KEY = 'sb_publishable_1cKjT-XYqFZzcLWDet-Qlg_cfZcdV3W';

    // Put here the page you want people to reach if slug is missing or invalid.
    // This should NOT be the redirect app itself unless you really want that behavior.
    var FALLBACK_URL = 'https://medimfarm.ro/Home/Index';

    function getSlug() {
      return window.location.pathname.replace(/^\/+/, '').replace(/\/+$/, '');
    }

    async function getDestination(slug) {
      try {
        if (slug) {
          var res = await fetch(
            SUPABASE_URL +
              '/rest/v1/clarity_qrcodes?slug=eq.' +
              encodeURIComponent(slug) +
              '&select=destination_url',
            {
              headers: {
                apikey: SUPABASE_ANON_KEY,
                Authorization: 'Bearer ' + SUPABASE_ANON_KEY
              }
            }
          );

          if (res.ok) {
            var rows = await res.json();
            if (rows && rows.length && rows[0].destination_url) {
              return rows[0].destination_url;
            }
          }
        } else {
          var res2 = await fetch(
            SUPABASE_URL + '/rest/v1/clarity_config?id=eq.1&select=destination_url',
            {
              headers: {
                apikey: SUPABASE_ANON_KEY,
                Authorization: 'Bearer ' + SUPABASE_ANON_KEY
              }
            }
          );

          if (res2.ok) {
            var cfg = await res2.json();
            if (cfg && cfg.length && cfg[0].destination_url) {
              return cfg[0].destination_url;
            }
          }
        }
      } catch (e) {}

      return FALLBACK_URL;
    }

    async function logScan(slug) {
      try {
        await fetch(SUPABASE_URL + '/rest/v1/clarity_scans', {
          method: 'POST',
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            Prefer: 'return=minimal'
          },
          body: JSON.stringify({
            scanned_at: new Date().toISOString(),
            qr_slug: slug || 'default'
          })
        });
      } catch (e) {}
    }

    async function run() {
      var slug = getSlug();
      var destination = await getDestination(slug);

      // fire and forget is fine here
      logScan(slug);

      window.location.replace(destination);
    }

    run();
  </script>
</body>
</html>
