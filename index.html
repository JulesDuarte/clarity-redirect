<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F2EDE6;
      font-family: Arial, sans-serif;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2A5240;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .3; transform: scale(.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="dot"></div>
  <script>
    var SUPABASE_URL = 'https://gjweufogltwzescnauji.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdqd2V1Zm9nbHR3emVzY25hdWppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzUwNDQsImV4cCI6MjA5MDAxMTA0NH0.NStg2xuoq7Ec-qDaG0eI2-v8WQEYzZK0MVMAkauDN8g';
    var FALLBACK_URL = 'https://medimfarm.ro';

    function getSlug() {
      var path = window.location.pathname.replace(/^\/+/, '').replace(/\/+$/, '');
      path = path.replace(/\.html$/, '');
      return path;
    }

    async function getDestination(slug) {
      try {
        if (slug) {
          var cacheBuster = '&_cb=' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          
          var res = await fetch(
            SUPABASE_URL +
              '/rest/v1/clarity_qrcodes?slug=eq.' +
              encodeURIComponent(slug) +
              '&select=destination_url' +
              cacheBuster,
            {
              method: 'GET',
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                'Cache-Control': 'no-cache, no-store, must-revalidate, max-age=0',
                'Pragma': 'no-cache',
                'Expires': '0'
              },
              cache: 'no-store'
            }
          );
          
          if (res.ok) {
            var rows = await res.json();
            if (rows && rows.length && rows[0].destination_url) {
              console.log('✅ Found destination:', rows[0].destination_url);
              return rows[0].destination_url;
            } else {
              console.log('⚠️ No rows found for slug:', slug);
            }
          } else {
            console.log('❌ Fetch failed:', res.status, res.statusText);
          }
        }
      } catch (e) {
        console.error('❌ Redirect error:', e);
      }
      console.log('↩️ Using fallback:', FALLBACK_URL);
      return FALLBACK_URL;
    }

    async function logScan(slug) {
      try {
        await fetch(SUPABASE_URL + '/rest/v1/clarity_scans', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            scanned_at: new Date().toISOString(),
            qr_slug: slug || 'default'
          })
        });
      } catch (e) {
        console.error('Scan logging error:', e);
      }
    }

    async function run() {
      var slug = getSlug();
      console.log('🔍 Processing slug:', slug);
      
      var destination = await getDestination(slug);
      console.log('🎯 Final destination:', destination);
      
      logScan(slug);
      window.location.replace(destination);
    }

    run();
  </script>
</body>
</html>
