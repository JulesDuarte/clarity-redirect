<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#F2EDE6;font-family:sans-serif;}
  .dot{width:10px;height:10px;border-radius:50%;background:#2A5240;
    animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
</style>
</head>
<body>
<div class="dot"></div>
<script>
var SUPABASE_URL = 'https://gjweufogltwzescnauji.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_1cKjT-XYqFZzcLWDet-Qlg_cfZcdV3W';
var FALLBACK_URL = 'https://clarityapp.ro';

async function run(){
  var destination = FALLBACK_URL;
  try {
    var res = await fetch(
      SUPABASE_URL + '/rest/v1/clarity_config?id=eq.1&select=destination_url',
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY } }
    );
    if(res.ok){
      var data = await res.json();
      if(data && data[0] && data[0].destination_url) destination = data[0].destination_url;
    }
    fetch(SUPABASE_URL + '/rest/v1/clarity_scans', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ scanned_at: new Date().toISOString() })
    });
  } catch(e) {}
  window.location.replace(destination);
}

run();
</script>
</body>
</html>
