<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Mode</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: monospace;
      background: #1a1a1a;
      color: #0f0;
      font-size: 14px;
    }
    .log { margin: 5px 0; }
    .error { color: #f00; }
    .success { color: #0f0; }
    .info { color: #0af; }
  </style>
</head>
<body>
  <h2>🔍 Clarity Redirect Debug</h2>
  <div id="log"></div>
  <script>
    var SUPABASE_URL = 'https://gjweufogltwzescnauji.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdqd2V1Zm9nbHR3emVzY25hdWppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzUwNDQsImV4cCI6MjA5MDAxMTA0NH0.NStg2xuoq7Ec-qDaG0eI2-v8WQEYzZK0MVMAkauDN8g';
    var FALLBACK_URL = 'https://medimfarm.ro';

    function log(msg, type = 'info') {
      var div = document.createElement('div');
      div.className = 'log ' + type;
      div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
      document.getElementById('log').appendChild(div);
      console.log(msg);
    }

    function getSlug() {
      var path = window.location.pathname.replace(/^\/+/, '').replace(/\/+$/, '');
      path = path.replace(/\.html$/, '');
      return path;
    }

    async function getDestination(slug) {
      try {
        log('Starting redirect for slug: ' + slug, 'info');
        
        if (!slug) {
          log('No slug found in URL!', 'error');
          return FALLBACK_URL;
        }

        var url = SUPABASE_URL +
          '/rest/v1/clarity_qrcodes?slug=eq.' +
          encodeURIComponent(slug) +
          '&select=destination_url';
        
        log('Fetching from: ' + url, 'info');
        
        var res = await fetch(url, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
          }
        });
        
        log('Response status: ' + res.status, res.ok ? 'success' : 'error');
        
        if (res.ok) {
          var rows = await res.json();
          log('Rows returned: ' + JSON.stringify(rows), 'info');
          
          if (rows && rows.length && rows[0].destination_url) {
            log('Found destination: ' + rows[0].destination_url, 'success');
            return rows[0].destination_url;
          } else {
            log('No matching QR code found in database', 'error');
          }
        } else {
          var errorText = await res.text();
          log('Fetch error: ' + errorText, 'error');
        }
      } catch (e) {
        log('Exception: ' + e.message, 'error');
        log('Stack: ' + e.stack, 'error');
      }
      
      log('Using fallback: ' + FALLBACK_URL, 'info');
      return FALLBACK_URL;
    }

    async function run() {
      var slug = getSlug();
      log('=== CLARITY REDIRECT DEBUG ===', 'info');
      log('Current URL: ' + window.location.href, 'info');
      log('Extracted slug: ' + slug, 'info');
      
      var destination = await getDestination(slug);
      
      log('Final destination: ' + destination, 'success');
      log('Redirecting in 3 seconds...', 'info');
      
      setTimeout(function() {
        window.location.replace(destination);
      }, 3000);
    }

    run();
  </script>
</body>
</html>
